<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Энергомониторинг станций ж/д</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="icon.jpg" />
    <script>
      // Ensure trailing slash for subdirectory deployments (e.g. GitHub Pages) 
      // to guarantee relative assets (./assets/...) resolve to the correct folder path.
      (function() {
        var path = window.location.pathname;
        if (path && !path.endsWith('/') && !path.split('/').pop().includes('.')) {
          var newUrl = window.location.protocol + '//' + window.location.host + path + '/' + window.location.search + window.location.hash;
          window.location.replace(newUrl);
        }
      })();

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Calculate precise base path for subdirectory support (e.g. GitHub Pages)
          const base = window.location.pathname.endsWith('/') 
            ? window.location.pathname 
            : window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
          
          navigator.serviceWorker.register(base + 'sw.js')
            .then((reg) => {
              console.log('[PWA] Service Worker registered successfully:', reg.scope);
            })
            .catch((err) => {
              console.error('[PWA] Service Worker registration failed:', err);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
